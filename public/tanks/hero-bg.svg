<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3a6e" stop-opacity="0.14"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#0ea5a4" stop-opacity="0.14"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#0f172a" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <g opacity="0.55" filter="url(#soft)">
    <circle cx="260" cy="180" r="140" fill="#0ea5a4" fill-opacity="0.18"/>
    <circle cx="1400" cy="230" r="190" fill="#0b3a6e" fill-opacity="0.14"/>
    <circle cx="1120" cy="760" r="240" fill="#f97316" fill-opacity="0.12"/>
  </g>

  <!-- tank silhouettes (very subtle, background only) -->
  <g opacity="0.22">
    <g transform="translate(240,260)">
      <rect x="0" y="70" width="420" height="430" rx="210" fill="#0b3a6e"/>
      <rect x="70" y="0" width="280" height="160" rx="70" fill="#ffffff" fill-opacity="0.65"/>
    </g>
    <g transform="translate(860,240)">
      <rect x="0" y="85" width="420" height="450" rx="210" fill="#0ea5a4"/>
      <rect x="70" y="0" width="280" height="175" rx="70" fill="#ffffff" fill-opacity="0.65"/>
    </g>
  </g>
</svg>

