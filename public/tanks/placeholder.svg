<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b3a6e" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#0ea5a4" stop-opacity="0.14"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#0f172a" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#g)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <g fill="#0f172a" fill-opacity="0.8">
    <text x="70" y="120" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">
      Tank Photo Placeholder
    </text>
    <text x="70" y="185" font-family="Arial, Helvetica, sans-serif" font-size="24">
      Replace this file with real tank images in /public/tanks/
    </text>
  </g>
  <g transform="translate(70,260)">
    <rect width="1060" height="470" rx="36" fill="#ffffff" fill-opacity="0.55" stroke="#0f172a" stroke-opacity="0.12"/>
    <g transform="translate(70,70)" fill="#0f172a" fill-opacity="0.75" font-family="Arial, Helvetica, sans-serif">
      <text font-size="20" font-weight="700">Recommended:</text>
      <text y="46" font-size="18">- Use WebP/JPG images</text>
      <text y="86" font-size="18">- 1200×800 or larger</text>
      <text y="126" font-size="18">- Name: tank-1000l-plastic-01.webp</text>
    </g>
    <g transform="translate(70,250)" fill="#0f172a" fill-opacity="0.75" font-family="Arial, Helvetica, sans-serif">
      <text font-size="20" font-weight="700">Tip:</text>
      <text y="46" font-size="18">Match image filenames in src/data/tanks.json</text>
    </g>
  </g>
</svg>

